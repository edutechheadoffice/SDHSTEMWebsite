<body>
    <!-- start preloader -->
    <div class="preloader">
        <div class="vertical-centered-box">
            <div class="content">
                <div class="loader-circle"></div>
                <div class="loader-line-mask">
                    <div class="loader-line"></div>
                </div>
                <img src="assets/images/preloader.png" alt="">
            </div>
        </div>
    </div>
    <!-- end preloader -->
    <div class="wpo-login-area">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                  
                    <form id="loginForm" class="wpo-accountWrapper" action="#">
                        <div class="wpo-accountInfo">
                            <div class="wpo-accountInfoHeader">
                                <a href="#"><img src="assets/images/Main Logo SDH - Horizontal - White.png" alt=""></a>
                                    
                            </div>
                            <div class="image">
                                <img src="assets/images/login.png" alt="">
                            </div>
                            <div class="back-home">
                                <a class="wpo-accountBtn" href="index.html">
                                    <span class="">Back To Home</span>
                                </a>
                            </div>
                        </div>
                        <div class="wpo-accountForm form-style">
                            <div class="fromTitle">
                                <h2>Admin | Login</h2>
                                <p>Sign into your admin account to upload your STEM projects</p>
                            </div>
                            <div class="row">
                               <div class="col-lg-12 col-md-12 col-12">
    <div class="floating-group">
        <input type="text" id="username" placeholder="">
        <label for="username">Username</label>
    </div>
</div>

                              <div class="col-lg-12 col-md-12 col-12">
    <div class="floating-group password-group">
        <input type="password" id="password"placeholder="">
        <label for="password">Password</label>
        <button type="button" class="toggle-password">
            <i class="fa fa-eye"></i>
        </button>
    </div>
</div>
                                <div class="col-lg-12 col-md-12 col-12">
                                    <button type="submit" class="wpo-accountBtn">Login</button>
                                </div>
                            </div>
                          
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
<div class="toast-container position-fixed top-0 end-0 p-4">
  <div id="liveToast" class="custom-toast">

    <!-- Particle Layer -->
    <div class="toast-particles" id="toastParticles"></div>

    <div class="toast-icon" id="toastIcon">
      <i class="bi bi-check-circle-fill"></i>
    </div>

    <div class="toast-content">
      <div class="toast-title" id="toastTitle">Success</div>
      <div class="toast-message" id="toastMessage">Login successful</div>
    </div>

    <div class="toast-progress">
      <div class="toast-progress-bar" id="toastProgress"></div>
    </div>

  </div>
</div>

    ================================================== -->

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <!-- Plugins -->
    <script src="assets/js/modernizr.custom.js"></script>
    <script src="assets/js/jquery-plugin-collection.js"></script>
      <!-- Custom script -->
       <script src="assets/js/login.js"></script>
    <script src="assets/js/script.js"></script>
